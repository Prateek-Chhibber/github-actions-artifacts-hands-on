name: Workflow Demo

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Create a text file
      run: echo "Hello, world!" > hello.txt

    - name: Archive text file
      uses: actions/upload-artifact@v7
      with:
        name: hello-artifact
        path: hello.txt

  download:
    needs: build                # Ensures this runs after the build job
    runs-on: ubuntu-latest

    steps:
    - name: Download text file
      uses: actions/download-artifact@v7
      with:
        name: hello-artifact
        path: ./artifacts       # Places the file in the artifacts directory
    - name: List files (Debug step)
      run: ls -R ./artifacts

    - name: Display content of the text file
      run: cat ./artifacts/hello.txt
